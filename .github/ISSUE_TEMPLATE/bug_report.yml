name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to idleclaw.com
        2. Select model X
        3. Send message "..."
        4. See error
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
      description: What did you expect to happen, and what actually happened?
  - type: input
    id: model
    attributes:
      label: Model
      description: Which model were you using?
      placeholder: e.g., qwen3:32b
  - type: input
    id: environment
    attributes:
      label: Browser / OS
      placeholder: e.g., Chrome 120, macOS 14
