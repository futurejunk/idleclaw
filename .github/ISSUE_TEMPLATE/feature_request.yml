name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Why is this useful? What problem does it solve?
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this could work? (optional)
